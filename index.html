<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Connection String Encryptor</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #313244;
            border-radius: 12px;
            padding: 32px;
            width: 680px;
            max-width: 96vw;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 1.4rem;
            color: #cba6f7;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 0.82rem;
            color: #6c7086;
            margin-bottom: 28px;
        }

        label {
            font-size: 0.85rem;
            color: #a6adc8;
            display: block;
            margin-bottom: 6px;
            margin-top: 16px;
        }

        input,
        textarea {
            width: 100%;
            background: #1e1e2e;
            border: 1px solid #45475a;
            border-radius: 8px;
            color: #cdd6f4;
            font-size: 0.9rem;
            padding: 10px 12px;
            outline: none;
            transition: border-color .2s;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            border-color: #cba6f7;
        }

        textarea {
            min-height: 80px;
            font-family: 'Cascadia Code', 'Consolas', monospace;
            font-size: 0.82rem;
        }

        .row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 600;
            transition: opacity .2s;
        }

        button:hover {
            opacity: 0.85;
        }

        .btn-enc {
            background: #cba6f7;
            color: #1e1e2e;
        }

        .btn-dec {
            background: #89dceb;
            color: #1e1e2e;
        }

        .btn-copy {
            background: #a6e3a1;
            color: #1e1e2e;
            flex: 0 0 auto;
            padding: 11px 18px;
        }

        .result-box {
            margin-top: 20px;
        }

        .result-label {
            font-size: 0.82rem;
            color: #a6adc8;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .result {
            background: #1e1e2e;
            border: 1px solid #45475a;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Cascadia Code', 'Consolas', monospace;
            font-size: 0.8rem;
            word-break: break-all;
            min-height: 52px;
            color: #a6e3a1;
        }

        .result.error {
            color: #f38ba8;
        }

        .result.info {
            color: #89dceb;
        }

        .badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 20px;
            background: #45475a;
            color: #bac2de;
        }

        .note {
            margin-top: 14px;
            font-size: 0.78rem;
            color: #6c7086;
            background: #1e1e2e;
            border-left: 3px solid #45475a;
            padding: 8px 12px;
            border-radius: 4px;
        }

        .btn-gen {
            flex: 0 0 auto;
            padding: 10px 12px;
            font-size: 0.85rem;
            background: #45475a;
            color: #cdd6f4;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-gen:hover {
            background: #585b70;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🔐 Connection String Encryptor</h1>
        <p class="subtitle">Encrypt / decrypt values for <code>appsettings.json</code> — runs entirely offline on your machine</p>

        <label>Encryption:Key <span class="badge">from appsettings.json</span></label>
        <div style="display:flex; gap: 8px;">
            <input type="password" id="encKey" placeholder="Enter your key here..." style="flex: 1;" />
            <button class="btn-gen" onclick="generateKey()" title="Generate random 32 bytes (Base64)">🎲 Gen Key</button>
            <button class="btn-gen" onclick="toggleKey()" id="btnToggleKey" title="Toggle visibility" style="padding: 10px;">👁️</button>
        </div>

        <label>Value to encrypt / decrypt</label>
        <textarea id="inputVal" placeholder="Enter value to encrypt / decrypt..."></textarea>

        <div class="row">
            <button class="btn-enc" onclick="doEncrypt()">🔒 Encrypt</button>
            <button class="btn-dec" onclick="doDecrypt()">🔓 Decrypt</button>
        </div>

        <div class="result-box">
            <div class="result-label">
                <span>Result</span>
                <button class="btn-copy" onclick="copyResult()">Copy</button>
            </div>
            <div class="result" id="result">—</div>
        </div>

        <p class="note">⚠️ All processing happens <strong>in your browser</strong>, no data is sent externally.</p>
    </div>

    <script>
        async function deriveKeyIV(encryptionKey) {
            const enc = new TextEncoder();
            const hashBuf = await crypto.subtle.digest('SHA-256', enc.encode(encryptionKey));
            const hash = new Uint8Array(hashBuf);
            const keyBytes = hash.slice(0, 32);
            const iv = hash.slice(16, 32); // matches C#: keyHash[16..32]
            const cryptoKey = await crypto.subtle.importKey('raw', keyBytes, { name: 'AES-CBC' }, false, ['encrypt', 'decrypt']);
            return { cryptoKey, iv };
        }

        async function doEncrypt() {
            const key = document.getElementById('encKey').value.trim();
            const val = document.getElementById('inputVal').value;
            const out = document.getElementById('result');
            if (!key || !val) { setResult('❌ Enter Encryption Key and value to encrypt', 'error'); return; }
            try {
                const { cryptoKey, iv } = await deriveKeyIV(key);
                const data = new TextEncoder().encode(val);
                const encrypted = await crypto.subtle.encrypt({ name: 'AES-CBC', iv }, cryptoKey, data);
                const b64 = btoa(String.fromCharCode(...new Uint8Array(encrypted)));
                setResult('ENC:' + b64, '');
            } catch (e) { setResult('❌ Error: ' + e.message, 'error'); }
        }

        async function doDecrypt() {
            const key = document.getElementById('encKey').value.trim();
            const val = document.getElementById('inputVal').value.trim();
            const out = document.getElementById('result');
            if (!key || !val) { setResult('❌ Enter Encryption Key and ENC:... string', 'error'); return; }
            if (!val.startsWith('ENC:')) { setResult('ℹ️ Value is not encrypted (missing ENC: prefix)', 'info'); return; }
            try {
                const { cryptoKey, iv } = await deriveKeyIV(key);
                const binaryStr = atob(val.substring(4));
                const bytes = Uint8Array.from(binaryStr, c => c.charCodeAt(0));
                const decrypted = await crypto.subtle.decrypt({ name: 'AES-CBC', iv }, cryptoKey, bytes);
                setResult(new TextDecoder().decode(decrypted), '');
            } catch (e) { setResult('❌ Invalid Key or corrupted data: ' + e.message, 'error'); }
        }

        function setResult(text, cls) {
            const el = document.getElementById('result');
            el.textContent = text;
            el.className = 'result ' + (cls || '');
        }

        function copyResult() {
            const text = document.getElementById('result').textContent;
            if (text && text !== '—') navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.btn-copy');
                btn.textContent = '✓ Copied!';
                setTimeout(() => btn.textContent = 'Copy', 1500);
            });
        }

        function generateKey() {
            const array = new Uint8Array(32);
            crypto.getRandomValues(array);
            const b64 = btoa(String.fromCharCode(...array));
            const input = document.getElementById('encKey');
            input.value = b64;
            input.type = 'text';
            document.getElementById('btnToggleKey').textContent = '🙈';
        }

        function toggleKey() {
            const input = document.getElementById('encKey');
            const btn = document.getElementById('btnToggleKey');
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }
    </script>
</body>

</html>
